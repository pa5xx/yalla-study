<!DOCTYPE html>
<html lang="en" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>المحاضرة — Yalla-Study</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/lecture.css" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />


</head>
<body>

  <!-- ── HEADER ── -->
  <header class="site-header">
    <a class="logo" href="index.html">
      <span class="logo-icon">🎓</span>
      <span class="logo-text">Yalla-Study</span>
    </a>
    <span class="header-sub">منصتك التعليمية</span>
  </header>

  <!-- ── BACK ── -->
  <a class="btn-back" id="back-link" href="subject.html">← رجوع</a>

  <!-- ── MAIN ── -->
  <main class="page">

    <!-- عنوان المحاضرة -->
    <div class="lecture-header card">
      <h2 id="lec-title-ar"></h2>
      <p id="lec-title-en" class="lecture-header-en ltr"></p>
    </div>

    <!-- ── التبويبات ── -->
    <div class="tabs" role="tablist">
      <button class="tab-btn active" data-tab="summary"  role="tab">📋 الملخص</button>
      <button class="tab-btn"        data-tab="glossary" role="tab">📖 المصطلحات</button>
      <button class="tab-btn"        data-tab="mcq"      role="tab">✏️ الأسئلة</button>
      <button class="tab-btn"        data-tab="codes"      role="tab">💻 أكواد</button>
    </div>

    <!-- ══════════════════ SUMMARY ══════════════════ -->
    <div class="tab-panel active card" id="panel-summary" role="tabpanel">
      <div class="summary-label">📋 ملخص المحاضرة</div>
      <p class="summary-text" id="summary-text"></p>
    </div>

    <!-- ══════════════════ GLOSSARY ══════════════════ -->
    <div class="tab-panel card" id="panel-glossary" role="tabpanel">
      <div class="glossary-header">
        <span style="font-weight:700">📖 قاموس المصطلحات</span>
        <span class="glossary-hint">اضغط 🔈 للنطق</span>
      </div>
      <!-- تُملأ بـ glossary.js -->
      <div class="glossary-grid" id="glossary-grid"></div>
    </div>

    <!-- ══════════════════ MCQ ══════════════════ -->
 <!-- MCQ -->
<div class="tab-panel" id="panel-mcq" role="tabpanel">
  <div class="score-banner" id="score-banner" hidden></div>
  <div class="mcq-list" id="mcq-list"></div>

  <button class="btn-submit" id="btn-submit" disabled>تسليم الإجابات ✓</button>
  <button class="btn-reset" id="btn-reset" hidden style="margin-top:10px">
    إعادة المحاولة 🔄
  </button>
</div>

<!-- CODES -->
<div class="tab-panel card" id="panel-codes" role="tabpanel">
  <div class="summary-label">💻 الأمثلة البرمجية</div>
  <div id="codes-container"></div>
</div>
  </main>

  <!-- ── SCRIPTS ── -->
  <script src="js/data.js"></script>
  <script src="js/glossary.js"></script>
  <script src="js/mcq.js"></script>
  <script src="js/lecture.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>


</body>
</html>
